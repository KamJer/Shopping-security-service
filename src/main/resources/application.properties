spring.application.name=ShoppingListServices
spring.datasource.url=jdbc:mariadb://localhost:3306/shopping_list_users_db
spring.datasource.driverClassName=org.mariadb.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect

server.port=4443
spring.jpa.properties.hibernate.format_sql=true
spring.threads.virtual.enabled=true
logging.file.name=logs/application.log
server.servlet.encoding.enabled=true

spring.flyway.url=jdbc:mariadb://localhost:3306/shopping_list_users_db
spring.flyway.driver-class-name=org.mariadb.jdbc.Driver

spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.flyway.user=${DB_USERNAME}
spring.flyway.password=${DB_PASSWORD}

jwt.secret_key.access=${JWT_ACCESS_SECRET}
jwt.secret_key.refresh=${JWT_REFRESH_SECRET}

management.endpoints.enabled-by-default=false



